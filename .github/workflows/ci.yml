name: ci

# 1. Add workflow_dispatch so you (or a recruiter) can manually click "Run"
on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # 2. Cache pip dependencies for speed

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      
      # Use the unified target we created
      - run: make ci